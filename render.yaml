services:
  - type: static
    name: i9-fit-gym-voice
    buildCommand: npm install --legacy-peer-deps && npm run build
    publishDir: dist
    envVars:
      - key: ELECTRON_SKIP_BINARY_DOWNLOAD
        value: "1"
      - key: NODE_VERSION
        value: "20"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
