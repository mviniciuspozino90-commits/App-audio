<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>i9 Fit - Spotify Conectado</title>
  <style>
    body {
      background-color: #09090b;
      color: #ffffff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      text-align: center;
    }
    .spinner {
      border: 3px solid rgba(255,255,255,0.1);
      border-radius: 50%;
      border-top: 3px solid #1DB954;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin {
      0 { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    h1 {
      font-size: 18px;
      font-weight: bold;
      margin: 0 0 10px 0;
    }
    p {
      font-size: 13px;
      color: #a1a1aa;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <h1 id="status-title">Conectando ao Spotify...</h1>
  <p id="status-desc">Esta janela fechará automaticamente.</p>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const code = urlParams.get('code');
    const queryError = urlParams.get('error');

    const hash = window.location.hash.substring(1);
    const hashParams = new URLSearchParams(hash);
    const accessToken = hashParams.get('access_token');
    const hashError = hashParams.get('error');

    function sendToOpener(message) {
      if (window.opener) {
        window.opener.postMessage(message, window.location.origin);
        setTimeout(() => {
          window.close();
        }, 800);
      } else {
        if (message.type === 'SPOTIFY_AUTH_SUCCESS') {
          document.getElementById('status-title').textContent = 'Conectado com sucesso!';
          document.getElementById('status-desc').textContent = 'Você já pode fechar esta janela.';
        } else {
          document.getElementById('status-title').textContent = 'Erro ao conectar';
          document.getElementById('status-desc').textContent = message.error || 'Ocorreu um erro desconhecido.';
        }
        const spinner = document.querySelector('.spinner');
        if (spinner) spinner.style.display = 'none';
      }
    }

    async function handleCallback() {
      // Prioritize PKCE Code Flow
      if (code) {
        const codeVerifier = localStorage.getItem('spotify_code_verifier');
        const clientId = localStorage.getItem('spotify_client_id');
        const redirectUri = `${window.location.origin}/spotify-callback.html`;

        if (!codeVerifier) {
          sendToOpener({
            type: 'SPOTIFY_AUTH_ERROR',
            error: 'Código verificador (code_verifier) não encontrado no localStorage.'
          });
          return;
        }

        if (!clientId) {
          sendToOpener({
            type: 'SPOTIFY_AUTH_ERROR',
            error: 'Client ID do Spotify não encontrado no localStorage.'
          });
          return;
        }

        try {
          const response = await fetch('https://accounts.spotify.com/api/token', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/x-www-form-urlencoded',
            },
            body: new URLSearchParams({
              client_id: clientId,
              grant_type: 'authorization_code',
              code: code,
              redirect_uri: redirectUri,
              code_verifier: codeVerifier,
            }),
          });

          if (!response.ok) {
            const errData = await response.json();
            throw new Error(errData.error_description || errData.error || 'Erro na resposta do servidor');
          }

          const data = await response.json();
          if (data.access_token) {
            sendToOpener({
              type: 'SPOTIFY_AUTH_SUCCESS',
              token: data.access_token
            });
          } else {
            throw new Error('Nenhum access_token retornado pelo Spotify.');
          }
        } catch (err) {
          sendToOpener({
            type: 'SPOTIFY_AUTH_ERROR',
            error: 'Erro na troca do token: ' + err.message
          });
        }
      } else if (queryError || hashError) {
        sendToOpener({
          type: 'SPOTIFY_AUTH_ERROR',
          error: queryError || hashError
        });
      } else if (accessToken) {
        // Fallback for older implicit grant
        sendToOpener({
          type: 'SPOTIFY_AUTH_SUCCESS',
          token: accessToken
        });
      } else {
        sendToOpener({
          type: 'SPOTIFY_AUTH_ERROR',
          error: 'Nenhum código ou token de autorização encontrado na URL.'
        });
      }
    }

    handleCallback();
  </script>
</body>
</html>
